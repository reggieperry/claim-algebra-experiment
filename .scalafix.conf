// Scalafix configuration.
//
// DisableSyntax enforces the Scalazzi safe subset of Scala — the
// referentially-transparent, exception-free, cast-free fragment (this is the
// scalafix expression of the safety warts scala-security.md mandates). Type-safe
// equality is left to cats `Eq`/`===` by convention rather than banned here, so
// `==` stays available in property tests as scala-testing.md's examples use it.
//
// OrganizeImports + RedundantSyntax are the standard Scala 3 hygiene rules.
//
// TypelevelMapSequence (typelevel-scalafix-cats, wired in build.sbt) flags a non-fused monadic
// chain — `l.map(f).sequence` — and points at the fused `l.traverse(f)`. It keys on `.sequence`
// (a cats-only method), so it fires only in cats code, never on a stdlib collection map.
//
// EffectMapConst is a project-local rule (scalafix/rules/, compiled from source) that flags an IO
// `.map(_ => x)` and points at `.as(x)`/`.void`. It replaces TypelevelAs, which over-fired on a
// legitimate `Iterator.map(_ => const)` where `.as` does not exist; EffectMapConst is scoped by
// symbol to `cats.effect.IO#map`, so it never touches a stdlib collection map (see the rule source).

rules = [
  OrganizeImports
  DisableSyntax
  RedundantSyntax
  TypelevelMapSequence
  "file:scalafix/rules/EffectMapConst.scala"
]

DisableSyntax.noNulls = true
DisableSyntax.noVars = true
DisableSyntax.noReturns = true
DisableSyntax.noWhileLoops = true
DisableSyntax.noAsInstanceOf = true
DisableSyntax.noIsInstanceOf = true
DisableSyntax.noFinalize = true
DisableSyntax.noValPatterns = true
DisableSyntax.noXml = true
DisableSyntax.keywords = [
  throw
]

OrganizeImports {
  targetDialect = Scala3
  removeUnused = false
  groupedImports = Merge
}
